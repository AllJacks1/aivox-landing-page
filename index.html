<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>
      AivoxTech Solutions | Affordable IT Services for Startups & SMEs in the
      Philippines
    </title>
    <meta
      name="title"
      content="AivoxTech Solutions | Affordable IT Services for Startups & SMEs in the Philippines"
    />
    <meta
      name="description"
      content="AivoxTech Solutions provides custom software, POS systems, web development, Android apps, and network security for startups and small businesses in the Philippines. Scalable, affordable, and high-quality IT solutions."
    />
    <meta
      name="keywords"
      content="IT solutions Philippines, web development Philippines, POS system Philippines, Android app development, custom software, startup IT services, SME technology solutions"
    />
    <meta name="author" content="AivoxTech Solutions" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="AivoxTech Solutions | Scalable IT Solutions for Growing Businesses"
    />
    <meta
      property="og:description"
      content="Empowering startups and SMEs with affordable IT solutions including websites, POS systems, apps, and network security."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://yourdomain.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="AivoxTech Solutions | IT Services Philippines"
    />
    <meta
      name="twitter:description"
      content="Custom software, websites, POS systems, and IT support tailored for startups and SMEs."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://yourdomain.com" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#2a3a9d" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "AivoxTech Solutions",
        "url": "https://yourdomain.com",
        "logo": "https://yourdomain.com/logo.png",
        "description": "Affordable and scalable IT solutions for startups and SMEs in the Philippines.",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "PH"
        },
        "sameAs": [
          "https://facebook.com/yourpage",
          "https://linkedin.com/company/yourpage"
        ]
      }
    </script>
  </head>

  <body>
    <!-- SEO fallback content (important for crawlers) -->
    <noscript>
      <h1>AivoxTech Solutions</h1>
      <p>
        AivoxTech Solutions provides affordable, high-quality IT services
        including web development, POS systems, Android applications, and
        network security for startups and small businesses in the Philippines.
      </p>
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
